<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Минералогическая Лаборатория</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2340">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Минералы">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body { background: #0d1117; color: #e0e6ef; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; overflow: hidden; }

/* ════════════════════════════════════════
   SHARED
════════════════════════════════════════ */
header {
  background: linear-gradient(135deg,#1a2340,#0d1117);
  padding: 12px 24px; border-bottom: 1px solid #1e2d4a;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
header h1 { font-size: 1.3rem; background: linear-gradient(90deg,#7eb8f7,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
header p  { font-size: 0.78rem; color: #4a6a8a; }

/* mineral card base */
.mineral-card {
  background: #1a2340; border: 2px solid #2a3a5c; border-radius: 10px;
  cursor: pointer; text-align: center;
  display: flex; flex-direction: column; align-items: center;
  transition: all .15s;
}
.mineral-card:hover  { border-color: #4a7fa5; background: #1e2d4a; }
.mineral-card.selected { border-color: #7eb8f7; background: #162a44; box-shadow: 0 0 0 3px rgba(126,184,247,.2); }
.mineral-card svg { display: block; }
.mineral-card .name { font-weight: 600; color: #b0c4de; line-height: 1.2; }
.mineral-card .hard { color: #4a6a8a; }

/* scrollbars */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-thumb { background: #2a3a5c; border-radius: 4px; }

/* exp buttons */
.exp-btn {
  padding: 8px 16px; border-radius: 8px; border: 2px solid #2a3a5c;
  background: #1a2340; color: #8090b0; font-size: 0.85rem;
  cursor: pointer; font-weight: 600; transition: all .15s;
}
.exp-btn.active        { border-color: #f59e0b; background: #2a1f00; color: #fbbf24; }
.exp-btn.active.strike { border-color: #ef4444; background: #2a0000; color: #f87171; }

/* sliders */
.slider-group { display: flex; flex-direction: column; gap: 4px; }
.slider-group label { font-size: 0.78rem; color: #6b7fa3; }
.slider-group .val   { font-size: 0.85rem; font-weight: 700; color: #e0e6ef; }
input[type=range] { accent-color: #7eb8f7; cursor: pointer; }

/* run button */
.run-btn {
  padding: 10px 24px; border-radius: 8px; border: none;
  background: linear-gradient(135deg,#1d4ed8,#7c3aed);
  color: white; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all .15s;
}
.run-btn:hover   { transform: scale(1.04); filter: brightness(1.15); }
.run-btn:active  { transform: scale(.97); }
.run-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* canvas zone */
.canvas-zone { flex: 1; position: relative; overflow: hidden; background: #080c14; min-height: 120px; }
canvas { width: 100%; height: 100%; display: block; }
.result-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg,rgba(8,12,20,.97) 0%,rgba(8,12,20,.72) 75%,transparent 100%);
  padding: 14px 20px 18px; max-height: 48%; overflow-y: auto; display: none;
}
.result-overlay::-webkit-scrollbar { display: none; }
.result-overlay h3 { font-size: 0.92rem; margin-bottom: 5px; }
.result-overlay p  { font-size: 0.8rem; color: #7a8fa8; line-height: 1.58; }
.result-heat   h3  { color: #f59e0b; }
.result-strike h3  { color: #ef4444; }

/* ════════════════════════════════════════
   DESKTOP  ≥ 769px
════════════════════════════════════════ */
@media (min-width: 769px) {
  /* hide mobile chrome */
  .mobile-tabs, .mobile-pages { display: none !important; }

  .desktop-body { display: flex; flex: 1; overflow: hidden; }

  /* left panel */
  .desktop-left {
    width: 380px; min-width: 300px;
    background: #111827; border-right: 1px solid #1e2d4a;
    display: flex; flex-direction: column; overflow: hidden;
  }
  .desktop-left .search-bar { padding: 12px 14px; border-bottom: 1px solid #1e2d4a; }
  .desktop-left .search-bar input {
    width: 100%; background: #1a2340; border: 1px solid #2a3a5c;
    border-radius: 8px; padding: 8px 14px; color: #e0e6ef; font-size: 0.88rem; outline: none;
  }
  .desktop-left .search-bar input:focus { border-color: #4a7fa5; }
  .desktop-minerals-grid {
    display: grid; grid-template-columns: repeat(3,1fr);
    gap: 10px; padding: 12px 14px; overflow-y: auto; flex: 1;
  }
  .desktop-minerals-grid .mineral-card { padding: 10px 6px; gap: 5px; }
  .desktop-minerals-grid .mineral-card svg  { width: 50px; height: 50px; }
  .desktop-minerals-grid .mineral-card .name { font-size: 0.7rem; }
  .desktop-minerals-grid .mineral-card .hard { font-size: 0.62rem; }

  /* right panel */
  .desktop-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .desktop-info {
    padding: 18px 26px; background: #111827; border-bottom: 1px solid #1e2d4a;
    display: flex; gap: 18px; align-items: center; min-height: 116px; flex-shrink: 0;
  }
  .desktop-info svg { width: 78px; height: 78px; flex-shrink: 0; }
  .desktop-info .placeholder { color: #3a4a6a; font-size: 0.95rem; }
  .desktop-info .minfo h2   { font-size: 1.2rem; color: #7eb8f7; margin-bottom: 4px; }
  .desktop-info .minfo .props { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 5px; }
  .desktop-info .minfo .prop  { background: #1a2340; border-radius: 6px; padding: 2px 9px; font-size: 0.75rem; color: #8090b0; }
  .desktop-info .minfo p { font-size: 0.8rem; color: #5a7a9a; line-height: 1.5; }

  .desktop-exp {
    padding: 14px 26px; background: #0d1117; border-bottom: 1px solid #1e2d4a; flex-shrink: 0;
  }
  .desktop-exp-title { font-size: 0.78rem; color: #5a7a9a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
  .desktop-exp-row { display: flex; gap: 20px; align-items: flex-end; flex-wrap: wrap; }
  .desktop-exp-row .exp-btn-pair { display: flex; gap: 8px; }
  .desktop-exp-row .slider-group { min-width: 180px; }
  .desktop-exp-row input[type=range] { width: 100%; }
}

/* ════════════════════════════════════════
   MOBILE  ≤ 768px
════════════════════════════════════════ */
@media (max-width: 768px) {
  body { overflow: hidden; }
  header { padding: 9px 14px; }
  header h1 { font-size: 1rem; }
  header p  { font-size: 0.67rem; }

  /* hide desktop chrome */
  .desktop-body { display: none !important; }

  /* tabs */
  .mobile-tabs { display: flex; background: #0d1117; border-bottom: 1px solid #1e2d4a; flex-shrink: 0; }
  .mobile-tab  { flex: 1; padding: 9px 4px; text-align: center; font-size: 0.76rem; color: #4a6a8a; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
  .mobile-tab.active { color: #7eb8f7; border-bottom-color: #7eb8f7; }
  .mobile-tab .badge { display:inline-block; background:#7eb8f7; color:#0d1117; border-radius:99px; font-size:0.58rem; padding:1px 5px; margin-left:3px; font-weight:700; }

  /* pages */
  .mobile-pages { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
  .mobile-page  { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .mobile-page.active { display: flex; }

  /* page1 grid */
  .mob-search { padding: 9px 12px; flex-shrink: 0; }
  .mob-search input {
    width: 100%; background: #1a2340; border: 1px solid #2a3a5c;
    border-radius: 8px; padding: 8px 13px; color: #e0e6ef; font-size: 0.88rem; outline: none;
  }
  .mob-minerals-grid {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 7px; padding: 9px 11px; overflow-y: auto; flex: 1;
  }
  .mob-minerals-grid::-webkit-scrollbar { display: none; }
  .mob-minerals-grid .mineral-card { padding: 7px 3px; gap: 3px; }
  .mob-minerals-grid .mineral-card svg  { width: 40px; height: 40px; }
  .mob-minerals-grid .mineral-card .name { font-size: 0.58rem; }
  .mob-minerals-grid .mineral-card .hard { font-size: 0.52rem; }

  /* page2 info strip */
  .mob-info {
    background: #111827; border-bottom: 1px solid #1e2d4a;
    padding: 9px 13px; display: flex; gap: 11px; align-items: center;
    flex-shrink: 0; min-height: 70px;
  }
  .mob-info svg { width: 48px; height: 48px; flex-shrink: 0; }
  .mob-info .placeholder { color: #3a4a6a; font-size: 0.82rem; }
  .mob-info .minfo h2   { font-size: 0.88rem; color: #7eb8f7; margin-bottom: 2px; }
  .mob-info .minfo .props { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 3px; }
  .mob-info .minfo .prop  { background: #1a2340; border-radius: 5px; padding: 2px 6px; font-size: 0.6rem; color: #8090b0; }
  .mob-info .minfo p { font-size: 0.68rem; color: #5a7a9a; line-height: 1.4; }

  /* page2 controls */
  .mob-exp { padding: 9px 13px; background: #0d1117; border-bottom: 1px solid #1e2d4a; flex-shrink: 0; }
  .mob-exp-type { display: flex; gap: 8px; margin-bottom: 9px; }
  .mob-exp-type .exp-btn { flex: 1; padding: 8px 4px; font-size: 0.8rem; }
  .mob-slider-row { display: flex; align-items: center; gap: 9px; margin-bottom: 9px; }
  .mob-slider-row label { font-size: 0.7rem; color: #5a7a9a; white-space: nowrap; }
  .mob-slider-row input { flex: 1; height: 20px; }
  .mob-slider-row .val  { font-size: 0.78rem; font-weight: 700; color: #e0e6ef; min-width: 58px; text-align: right; }
  .mob-run { width: 100%; padding: 10px; border-radius: 9px; border: none; background: linear-gradient(135deg,#1d4ed8,#7c3aed); color: white; font-size: 0.92rem; font-weight: 700; cursor: pointer; }
  .mob-run:active { transform: scale(.97); }
  .mob-run:disabled { opacity: .4; }

  .choose-hint { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; color:#3a4a6a; text-align:center; padding:20px; }
  .choose-hint svg { width:44px; height:44px; opacity:.35; }
  .choose-hint p { font-size:0.82rem; }
}
</style>
</head>
<body>

<header>
  <div>
    <h1>⚗️ Минералогическая Лаборатория</h1>
    <p>Выберите минерал и проведите эксперимент</p>
  </div>
</header>

<!-- ══════════ DESKTOP ══════════ -->
<div class="desktop-body">
  <!-- left -->
  <div class="desktop-left">
    <div class="search-bar">
      <input type="text" id="d-search" placeholder="🔍 Поиск минерала..." oninput="filterMinerals()">
    </div>
    <div class="desktop-minerals-grid" id="d-grid"></div>
  </div>

  <!-- right -->
  <div class="desktop-right">
    <div class="desktop-info" id="d-info">
      <div class="placeholder">← Выберите минерал из списка</div>
    </div>

    <div class="desktop-exp">
      <div class="desktop-exp-title">Эксперимент</div>
      <div class="desktop-exp-row">
        <div class="exp-btn-pair">
          <button class="exp-btn active"  id="d-btnHeat"   onclick="selectExp('heat')">🔥 Нагрев</button>
          <button class="exp-btn"         id="d-btnStrike"  onclick="selectExp('strike')">🔨 Удар</button>
        </div>
        <div class="slider-group" id="d-sliderHeat">
          <label>Температура: <span class="val" id="d-tempVal">500°C</span></label>
          <input type="range" id="d-tempSlider" min="50" max="3000" value="500"
                 oninput="document.getElementById('d-tempVal').textContent=this.value+'°C'">
        </div>
        <div class="slider-group" id="d-sliderStrike" style="display:none">
          <label>Сила удара: <span class="val" id="d-forceVal">30 Н·м</span></label>
          <input type="range" id="d-forceSlider" min="1" max="100" value="30"
                 oninput="document.getElementById('d-forceVal').textContent=this.value+' Н·м'">
        </div>
        <button class="run-btn" id="d-runBtn" onclick="runExperiment('d')" disabled>▶ Провести опыт</button>
      </div>
    </div>

    <div class="canvas-zone" id="d-canvasZone">
      <canvas id="d-canvas"></canvas>
      <div class="result-overlay" id="d-result"></div>
    </div>
  </div>
</div>

<!-- ══════════ MOBILE ══════════ -->
<div class="mobile-tabs">
  <div class="mobile-tab active" id="m-tab1" onclick="mobTab(1)">🪨 Минералы<span class="badge" id="m-badge">32</span></div>
  <div class="mobile-tab"        id="m-tab2" onclick="mobTab(2)">🔬 Опыт</div>
</div>

<div class="mobile-pages">
  <!-- page 1 -->
  <div class="mobile-page active" id="m-page1">
    <div class="mob-search">
      <input type="text" id="m-search" placeholder="🔍 Поиск минерала..." oninput="filterMinerals()">
    </div>
    <div class="mob-minerals-grid" id="m-grid"></div>
  </div>

  <!-- page 2 -->
  <div class="mobile-page" id="m-page2">
    <div class="mob-info" id="m-info">
      <div class="placeholder">← Сначала выберите минерал</div>
    </div>

    <div class="mob-exp">
      <div class="mob-exp-type">
        <button class="exp-btn active"  id="m-btnHeat"   onclick="selectExp('heat')">🔥 Нагрев</button>
        <button class="exp-btn"         id="m-btnStrike"  onclick="selectExp('strike')">🔨 Удар</button>
      </div>
      <div id="m-sliderHeat">
        <div class="mob-slider-row">
          <label>Темп.</label>
          <input type="range" id="m-tempSlider" min="50" max="3000" value="500"
                 oninput="document.getElementById('m-tempVal').textContent=this.value+'°C'">
          <span class="val" id="m-tempVal">500°C</span>
        </div>
      </div>
      <div id="m-sliderStrike" style="display:none">
        <div class="mob-slider-row">
          <label>Сила</label>
          <input type="range" id="m-forceSlider" min="1" max="100" value="30"
                 oninput="document.getElementById('m-forceVal').textContent=this.value+' Н·м'">
          <span class="val" id="m-forceVal">30 Н·м</span>
        </div>
      </div>
      <button class="mob-run" id="m-runBtn" onclick="runExperiment('m')" disabled>▶ Провести опыт</button>
    </div>

    <div class="canvas-zone" id="m-canvasZone">
      <canvas id="m-canvas"></canvas>
      <div class="result-overlay" id="m-result"></div>
      <div class="choose-hint" id="m-hint">
        <svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg">
          <polygon points="26,6 42,18 38,38 14,38 10,18" fill="#2a3a5c" stroke="#3a4a6a" stroke-width="2"/>
        </svg>
        <p>Перейдите на вкладку «Минералы»,<br>выберите образец и вернитесь сюда</p>
      </div>
    </div>
  </div>
</div>

<script>

const MINERALS = [
  { id:'quartz',     name:'Кварц',        formula:'SiO₂',             hardness:7,   melt:1650, color:'#e8f4f8', color2:'#b0d8ec', cleavage:'отсутствует',              system:'тригональная',

    strikeEffects:{5:'Мягкий: легко царапается ногтем. Удар оставляет вмятину.',20:'Раскалывается на правильные кубики по плоскостям спайности.',50:'Рассыпается на множество маленьких кубиков. Характерный хруст.',80:'Превращается в порошок. Кубическая симметрия заметна даже в мелких обломках.'} },

let selected=null, expType='heat', animFrame=null;

// ─── MOBILE TABS ─────────────────────────────────────────────────────────────
function mobTab(n){
  document.getElementById('m-tab1').className='mobile-tab'+(n===1?' active':'');
  document.getElementById('m-tab2').className='mobile-tab'+(n===2?' active':'');
  document.getElementById('m-page1').className='mobile-page'+(n===1?' active':'');
  document.getElementById('m-page2').className='mobile-page'+(n===2?' active':'');
  if(n===2) setTimeout(()=>resizeCanvas('m'),40);
}

// ─── BUILD GRIDS ─────────────────────────────────────────────────────────────
function buildGrid(list){
  const q=getQ();
  // desktop
  const dg=document.getElementById('d-grid');
  dg.innerHTML='';
  list.forEach(m=>{
    const d=document.createElement('div');
    d.className='mineral-card'+(selected&&selected.id===m.id?' selected':'');
    d.innerHTML=makeSVG(m)+`<div class="name">${m.name}</div><div class="hard">Тв.${m.hardness}</div>`;
    d.onclick=()=>selectMineral(m,'d');
    dg.appendChild(d);
  });
  // mobile
  const mg=document.getElementById('m-grid');
  mg.innerHTML='';
  list.forEach(m=>{
    const d=document.createElement('div');
    d.className='mineral-card'+(selected&&selected.id===m.id?' selected':'');
    d.innerHTML=makeSVG(m)+`<div class="name">${m.name}</div><div class="hard">Тв.${m.hardness}</div>`;
    d.onclick=()=>{ selectMineral(m,'m'); mobTab(2); };
    mg.appendChild(d);
  });
  const cnt=list.length;
  document.getElementById('m-badge').textContent=cnt;
}
function getQ(){
  const ds=document.getElementById('d-search').value.toLowerCase();
  const ms=document.getElementById('m-search').value.toLowerCase();
  return ds||ms;
}
function filterMinerals(){
  // sync search boxes
  const ds=document.getElementById('d-search').value;
  const ms=document.getElementById('m-search').value;
  const q=(ds||ms).toLowerCase();
  document.getElementById('d-search').value=ds||ms;
  document.getElementById('m-search').value=ds||ms;
  buildGrid(MINERALS.filter(m=>m.name.toLowerCase().includes(q)||m.formula.toLowerCase().includes(q)));
}
buildGrid(MINERALS);

      <div class="props">

        <span class="prop">${m.system}</span>

        ${m.melt?`<span class="prop">Тпл ${m.melt}°C</span>`:''}
      </div>
      <p>${m.desc}</p>
    </div>`;

  // mobile info
  document.getElementById('m-info').innerHTML=`
    ${makeSVG(m)}
    <div class="minfo">
      <h2>${m.name}</h2>
      <div class="props">
        <span class="prop">${m.formula}</span>
        <span class="prop">Тв. ${m.hardness}</span>
        <span class="prop">${m.system}</span>

      </div>
      <p>${m.desc}</p>
    </div>`;

// ─── EXP TYPE ────────────────────────────────────────────────────────────────
function selectExp(type){

  ['d','m'].forEach(p=>{
    document.getElementById(`${p}-btnHeat`).className  ='exp-btn'+(type==='heat'  ?' active':'');
    document.getElementById(`${p}-btnStrike`).className='exp-btn'+(type==='strike'?' active strike':'');

// ─── CANVAS ──────────────────────────────────────────────────────────────────
function resizeCanvas(p){
  const c=document.getElementById(`${p}-canvas`);
  const z=c.parentElement;
  c.width=z.clientWidth; c.height=z.clientHeight;
}
window.addEventListener('resize',()=>{ resizeCanvas('d'); resizeCanvas('m'); });
setTimeout(()=>{ resizeCanvas('d'); resizeCanvas('m'); },100);

function clearCanvas(p){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  const c=document.getElementById(`${p}-canvas`);
  c.getContext('2d').clearRect(0,0,c.width,c.height);
}

function lerpColor(a,b,t){
  const ah=a.replace('#',''),bh=b.replace('#','');
  const parse=h=>[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
  const [ar,ag,ab]=parse(ah),[br,bg,bb]=parse(bh);
  return '#'+[ar+(br-ar)*t,ag+(bg-ag)*t,ab+(bb-ab)*t].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');
}

function getResultText(m,type,val){
  const eff=type==='heat'?m.heatEffects:m.strikeEffects;
  const keys=Object.keys(eff).map(Number).sort((a,b)=>a-b);
  let txt=eff[keys[0]];
  for(const k of keys) if(val>=k) txt=eff[k];
  return txt;
}

// ─── HEAT ANIMATION ──────────────────────────────────────────────────────────
function animateHeat(p,temp){
  resizeCanvas(p);
  const canvas=document.getElementById(`${p}-canvas`);
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2-20;
  const r=Math.min(W,H)*0.16;
  const ratio=Math.min(temp/3000,1);
  const particles=[];
  const maxP=Math.floor(ratio*80);
  for(let i=0;i<maxP;i++) particles.push({x:cx+(Math.random()-.5)*r*2,y:cy+Math.random()*r,vx:(Math.random()-.5)*1.5,vy:-(Math.random()*2+.5)*(ratio*2+.5),life:Math.random(),maxLife:Math.random()*.7+.3,size:Math.random()*3+1});
  let t=0;
  function frame(){
    ctx.clearRect(0,0,W,H); t++;
    if(ratio>.1){const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r*3);g.addColorStop(0,`rgba(255,${Math.floor(200*(1-ratio))},0,${Math.min(ratio*.35,.3)})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
    if(ratio>.2){const mg=ctx.createRadialGradient(cx,cy,r*.5,cx,cy,r*1.6);mg.addColorStop(0,`rgba(255,${Math.floor(120*(1-ratio))},0,0.35)`);mg.addColorStop(1,'transparent');ctx.fillStyle=mg;ctx.beginPath();ctx.arc(cx,cy,r*1.6,0,Math.PI*2);ctx.fill();}
    let bc=selected?selected.color:'#888';
    if(ratio>.3) bc=lerpColor(bc,ratio>.7?'#ffffff':'#ff8800',ratio*.65);
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=bc;ctx.fill();
    ctx.strokeStyle=selected?selected.color2:'#555';ctx.lineWidth=2;ctx.stroke();
    if(temp>400){const ci=Math.min((temp-400)/2000,1);ctx.strokeStyle=`rgba(20,0,0,${ci*.55})`;ctx.lineWidth=1.5;const nc=Math.floor(ci*6);for(let i=0;i<nc;i++){const a=(i/nc)*Math.PI*2+t*.01;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a+.4)*r*.9,cy+Math.sin(a+.4)*r*.9);ctx.stroke();}}
    for(const p2 of particles){
      p2.x+=p2.vx+Math.sin(t*.1+p2.life*10)*.3;p2.y+=p2.vy;p2.life-=.012;
      if(p2.life<=0){p2.x=cx+(Math.random()-.5)*r*2;p2.y=cy+r*.5;p2.vx=(Math.random()-.5)*1.5;p2.vy=-(Math.random()*2+.5)*(ratio*2+.5);p2.life=p2.maxLife;}
      const al=p2.life/p2.maxLife,fp=1-al;
      const fc=temp>1200?`rgba(255,255,${Math.floor(200*fp)},${al*.8})`:temp>600?`rgba(255,${Math.floor(180*(1-fp*.7))},0,${al*.8})`:`rgba(255,${Math.floor(120+80*fp)},0,${al*.7})`;
      ctx.beginPath();ctx.arc(p2.x,p2.y,p2.size*(1-fp*.5),0,Math.PI*2);ctx.fillStyle=fc;ctx.fill();
    }
    ctx.fillStyle='#e0e6ef';ctx.font='bold 18px Segoe UI';ctx.textAlign='center';ctx.fillText(`${temp}°C`,cx,cy+r+40);
    ctx.font='12px Segoe UI';ctx.fillStyle='#5a7a9a';
    const st=temp<100?'Слабый нагрев':temp<400?'Умеренный нагрев':temp<800?'Сильный нагрев':temp<1500?'Раскалено добела':'Плавление';
    ctx.fillText(st,cx,cy+r+58);
    animFrame=requestAnimationFrame(frame);
  }
  frame();
}

// ─── STRIKE ANIMATION ────────────────────────────────────────────────────────
function animateStrike(p,force){
  resizeCanvas(p);
  const canvas=document.getElementById(`${p}-canvas`);
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  const cx=W/2,cy=H/2-10;
  const r=Math.min(W,H)*0.15;
  const ratio=force/100;
  const crackAngles=[];const nc=Math.floor(ratio*8)+1;
  for(let i=0;i<nc;i++) crackAngles.push(Math.random()*Math.PI*2);
  const fragments=[];const nf=Math.floor(ratio*25)+5;
  for(let i=0;i<nf;i++){const a=Math.random()*Math.PI*2,sp=(Math.random()*ratio*6+1);fragments.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-ratio*2,size:(Math.random()*ratio*12+2)*(1-ratio*.4),angle:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.2,alpha:1});}
  const sparks=[];const hard=selected?selected.hardness:5;
  if(force>20){const ns=Math.floor(ratio*hard*7);for(let i=0;i<ns;i++){const a=-Math.PI/2+(Math.random()-.5)*Math.PI,sp=Math.random()*ratio*8+2;sparks.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,life:1,maxLife:Math.random()*.5+.2});}}
  let t=0;const IF=8;const frag=ratio>.25;
  function frame(){
    ctx.clearRect(0,0,W,H);t++;
    if(t<IF){const hy=cy-r-50+(50+r)*(t/IF);ctx.fillStyle='#8090a0';ctx.strokeStyle='#5a6a7a';ctx.lineWidth=2;ctx.beginPath();ctx.rect(cx-16,hy-24,32,24);ctx.fill();ctx.stroke();ctx.strokeStyle='#8b4513';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(cx,hy-24);ctx.lineTo(cx+8,hy-70);ctx.stroke();}
    if(t===IF||t===IF+1){const fl=r*2.2,g=ctx.createRadialGradient(cx,cy,0,cx,cy,fl);g.addColorStop(0,`rgba(255,255,200,${t===IF?.8:.3})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,fl,0,Math.PI*2);ctx.fill();}
    if(t<IF){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=selected?selected.color:'#888';ctx.fill();ctx.strokeStyle=selected?selected.color2:'#555';ctx.lineWidth=2;ctx.stroke();}
    else if(!frag){ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=selected?selected.color:'#888';ctx.fill();ctx.strokeStyle=selected?selected.color2:'#555';ctx.lineWidth=2;ctx.stroke();for(const a of crackAngles){ctx.strokeStyle='rgba(0,0,0,0.6)';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);ctx.stroke();}}
    else if(t>IF){for(const fr of fragments){if(t>IF+2){fr.x+=fr.vx;fr.y+=fr.vy;fr.vy+=.15;fr.angle+=fr.spin;fr.alpha=Math.max(0,fr.alpha-.008);}if(fr.alpha<.05) continue;ctx.save();ctx.translate(fr.x,fr.y);ctx.rotate(fr.angle);ctx.globalAlpha=fr.alpha;ctx.beginPath();const pts=4+Math.floor(Math.random()*3);for(let i=0;i<pts;i++){const a=(i/pts)*Math.PI*2,rr=fr.size*(.7+Math.random()*.6);if(i===0)ctx.moveTo(Math.cos(a)*rr,Math.sin(a)*rr);else ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr);}ctx.closePath();ctx.fillStyle=selected?selected.color:'#888';ctx.fill();ctx.strokeStyle=selected?selected.color2:'#555';ctx.lineWidth=1;ctx.stroke();ctx.restore();}}
    for(const s of sparks){if(t<=IF) continue;s.x+=s.vx;s.y+=s.vy;s.vy+=.2;s.life-=.04;if(s.life<=0) continue;const sa=s.life/s.maxLife;ctx.beginPath();ctx.arc(s.x,s.y,2*sa,0,Math.PI*2);ctx.fillStyle=`rgba(255,220,80,${sa})`;ctx.fill();}
    if(t>=IF&&t<IF+18){const wr=(t-IF)*4;ctx.beginPath();ctx.arc(cx,cy,wr,0,Math.PI*2);ctx.strokeStyle=`rgba(255,220,150,${1-(t-IF)/18})`;ctx.lineWidth=2;ctx.stroke();}
    ctx.fillStyle='#e0e6ef';ctx.font='bold 18px Segoe UI';ctx.textAlign='center';ctx.fillText(`${force} Н·м`,cx,cy+r+40);
    ctx.font='12px Segoe UI';ctx.fillStyle='#5a7a9a';
    const st=force<15?'Лёгкий удар':force<35?'Умеренный удар':force<65?'Сильный удар':force<85?'Мощный удар':'Разрушительный удар';
    ctx.fillText(st,cx,cy+r+58);
    animFrame=requestAnimationFrame(frame);
  }
  frame();
}

// ─── RUN ─────────────────────────────────────────────────────────────────────
function runExperiment(p){
  if(!selected) return;
  clearCanvas(p);
  const isHeat=expType==='heat';
  const valEl=isHeat?document.getElementById(`${p}-tempSlider`):document.getElementById(`${p}-forceSlider`);
  const val=parseInt(valEl.value);
  const text=getResultText(selected,expType,val);
  const ov=document.getElementById(`${p}-result`);
  ov.style.display='block';
  ov.className='result-overlay '+(isHeat?'result-heat':'result-strike');
  ov.innerHTML=`<h3>${isHeat?'🔥 Нагрев до '+val+'°C':'🔨 Удар силой '+val+' Н·м'}</h3><p>${text}</p>`;
  if(isHeat) animateHeat(p,val); else animateStrike(p,val);
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('[SW] registered, scope:', reg.scope))
      .catch(err => console.warn('[SW] registration failed:', err));
  });
}

// ── Install prompt (A2HS) ────────────────────────────────────────────────
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner after 3 s if not already installed
  setTimeout(() => {
    if (!deferredPrompt) return;
    const banner = document.createElement('div');
    banner.id = 'install-banner';
    banner.style.cssText = `
      position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
      background:#1a2340;border:1px solid #4a7fa5;border-radius:12px;
      padding:12px 18px;display:flex;align-items:center;gap:12px;
      box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:9999;
      font-family:'Segoe UI',sans-serif;font-size:0.85rem;color:#e0e6ef;
      max-width:320px;
    `;
    banner.innerHTML = `
      <span style="font-size:1.3rem">⚗️</span>
      <span>Установить приложение на устройство?</span>
      <button onclick="installPWA()" style="
        background:linear-gradient(135deg,#1d4ed8,#7c3aed);border:none;
        color:white;padding:6px 14px;border-radius:7px;cursor:pointer;
        font-weight:700;font-size:0.82rem;white-space:nowrap;
      ">Установить</button>
      <button onclick="document.getElementById('install-banner').remove()" style="
        background:none;border:none;color:#6b7fa3;cursor:pointer;font-size:1.1rem;padding:2px 4px;
      ">✕</button>
    `;
    document.body.appendChild(banner);
  }, 3000);
});

function installPWA() {
  const banner = document.getElementById('install-banner');
  if (banner) banner.remove();
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r => {
    console.log('[A2HS]', r.outcome);
    deferredPrompt = null;
  });
}

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const banner = document.getElementById('install-banner');
  if (banner) banner.remove();
});
</script>
